services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: game_quality
      MYSQL_USER: gameqa
      MYSQL_PASSWORD: gameqa_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_dev_password"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: &app_environment
      DATABASE_URL: mysql+pymysql://gameqa:gameqa_dev_password@mysql:3306/game_quality
      EXECUTION_MODE: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.task_queue.celery_app worker --loglevel=INFO --concurrency=1
    environment: *app_environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
