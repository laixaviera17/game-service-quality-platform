name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pytest -q -m "not integration" --cov=app --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: reliability_lab
          MYSQL_USER: reliability_lab
          MYSQL_PASSWORD: reliability_lab_dev
          MYSQL_ROOT_PASSWORD: root_dev_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_dev_password"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: mysql+pymysql://reliability_lab:reliability_lab_dev@127.0.0.1:3306/reliability_lab
      EXECUTION_MODE: celery
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
      RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: celery -A app.task_queue.celery_app worker --loglevel=INFO --concurrency=4 &
      - run: sleep 5
      - run: pytest -q -m integration
